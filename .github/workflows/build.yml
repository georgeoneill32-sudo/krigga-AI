name: Build Krigga AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get source code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache libncurses5:i386 libstdc++6:i386 libgtk2.0-0:i386 libpangox-1.0-0:i386 libpangoxft-1.0-0:i386 libidn11:i386 python3-pip zlib1g-dev libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv

      - name: Compile the APK
        run: |
          yes | buildozer android debug

      - name: Upload the final APK
        uses: actions/upload-artifact@v3
        with:
          name: KriggaAI-App
          path: bin/*.apk
