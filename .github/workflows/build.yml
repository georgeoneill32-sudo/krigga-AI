name: Build Krigga AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
            libffi-dev libssl-dev automake autopoint gettext lld llvm

      - name: Install Buildozer & Core Tools
        run: |
          pip install --upgrade pip
          pip install --upgrade "cython<3.0.0" buildozer virtualenv

      - name: Compile the APK Natively
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android debug

      - name: Upload Krigga AI APK
        uses: actions/upload-artifact@v4
        with:
          name: KriggaAI-App
          path: bin/*.apk
