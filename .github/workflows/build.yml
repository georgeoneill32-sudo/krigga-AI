name: Build Krigga AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System and Android Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y zip unzip autoconf libtool pkg-config libncurses-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext
          # Critical extra tools for Android SDK/NDK builds:
          sudo apt-get install -y openjdk-17-jdk patch helper-privnet
          pip install --upgrade pip
          pip install --upgrade buildozer cython virtualenv

      - name: Compile the APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          # Automatically accept all Android SDK licenses before compiling
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android debug

      - name: Upload the final APK
        uses: actions/upload-artifact@v4
        with:
          name: KriggaAI-App
          path: bin/*.apk
